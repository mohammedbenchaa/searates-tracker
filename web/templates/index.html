<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🚢 SeaRates Tracker — تتبع الحاويات</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg: #0f0f1a;
            --card: #1a1a2e;
            --card2: #16213e;
            --accent: #00d2ff;
            --accent2: #e94560;
            --green: #51cf66;
            --text: #e0e0e0;
            --muted: #888;
            --border: #2a2a4a;
            --radius: 12px;
            --font: 'Segoe UI', 'Tahoma', system-ui, sans-serif;
        }

        body {
            font-family: var(--font);
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            direction: rtl;
        }

        /* ── Header ── */
        .header {
            background: linear-gradient(135deg, #0f3460, #16213e);
            padding: 30px 20px;
            text-align: center;
            border-bottom: 2px solid var(--accent);
        }
        .header h1 { font-size: 1.8em; margin-bottom: 6px; }
        .header h1 span { color: var(--accent); }
        .header p { color: var(--muted); font-size: 0.9em; }

        /* ── Search Bar ── */
        .search-section {
            max-width: 700px;
            margin: 30px auto;
            padding: 0 20px;
        }
        .search-box {
            display: flex;
            gap: 10px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 6px;
            transition: border-color 0.2s;
        }
        .search-box:focus-within {
            border-color: var(--accent);
            box-shadow: 0 0 20px rgba(0,210,255,0.1);
        }
        .search-box input {
            flex: 1;
            background: transparent;
            border: none;
            color: #fff;
            font-size: 1.1em;
            padding: 14px 16px;
            outline: none;
            font-family: var(--font);
        }
        .search-box input::placeholder { color: #555; }
        .search-box select {
            background: var(--card2);
            color: #fff;
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 8px 12px;
            font-size: 0.85em;
            font-family: var(--font);
            cursor: pointer;
            outline: none;
        }
        .search-box button {
            background: var(--accent);
            color: #000;
            border: none;
            border-radius: 8px;
            padding: 14px 28px;
            font-size: 1em;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            font-family: var(--font);
            white-space: nowrap;
        }
        .search-box button:hover { background: #00e0ff; transform: scale(1.02); }
        .search-box button:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

        .example-hint {
            text-align: center;
            margin-top: 10px;
            color: var(--muted);
            font-size: 0.8em;
        }
        .example-hint a {
            color: var(--accent);
            cursor: pointer;
            text-decoration: none;
        }
        .example-hint a:hover { text-decoration: underline; }

        /* ── Loading ── */
        .loader {
            display: none;
            text-align: center;
            padding: 40px;
        }
        .loader.active { display: block; }
        .spinner {
            width: 48px; height: 48px;
            border: 3px solid var(--border);
            border-top: 3px solid var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 15px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ── Results ── */
        .results {
            display: none;
            max-width: 1000px;
            margin: 0 auto 40px;
            padding: 0 20px;
        }
        .results.active { display: block; }

        /* Summary Card */
        .summary {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 12px;
            margin-bottom: 20px;
        }
        .summary-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 18px;
            text-align: center;
        }
        .summary-card .label {
            font-size: 0.75em;
            color: var(--muted);
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .summary-card .value {
            font-size: 1.1em;
            font-weight: 700;
            color: #fff;
        }
        .summary-card .value.green { color: var(--green); }
        .summary-card .value.blue { color: var(--accent); }
        .summary-card .value.red { color: var(--accent2); }

        /* Progress Bar */
        .progress-wrap {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 18px;
            margin-bottom: 20px;
        }
        .progress-label {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 0.85em;
        }
        .progress-bar {
            height: 10px;
            background: var(--border);
            border-radius: 5px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--accent), var(--green));
            border-radius: 5px;
            transition: width 0.8s ease;
        }

        /* Map */
        #map {
            height: 400px;
            border-radius: var(--radius);
            border: 1px solid var(--border);
            margin-bottom: 20px;
            background: var(--card2);
        }

        /* Events Timeline */
        .events-title {
            font-size: 1.1em;
            font-weight: 700;
            margin-bottom: 15px;
            color: var(--accent);
        }
        .timeline {
            position: relative;
            padding-right: 30px;
        }
        .timeline::before {
            content: '';
            position: absolute;
            right: 10px;
            top: 0;
            bottom: 0;
            width: 2px;
            background: var(--border);
        }
        .timeline-item {
            position: relative;
            margin-bottom: 20px;
            padding: 14px 18px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            transition: border-color 0.2s;
        }
        .timeline-item:hover { border-color: var(--accent); }
        .timeline-item::before {
            content: '';
            position: absolute;
            right: -25px;
            top: 20px;
            width: 10px; height: 10px;
            border-radius: 50%;
            background: var(--accent);
            border: 2px solid var(--bg);
        }
        .timeline-item.latest::before {
            background: var(--green);
            box-shadow: 0 0 10px var(--green);
        }
        .timeline-item .event-date {
            font-size: 0.8em;
            color: var(--muted);
        }
        .timeline-item .event-desc {
            font-size: 1em;
            font-weight: 600;
            margin: 4px 0;
        }
        .timeline-item .event-loc {
            font-size: 0.85em;
            color: var(--accent);
        }
        .timeline-item .event-vessel {
            font-size: 0.8em;
            color: var(--muted);
        }

        /* Vessels */
        .vessels {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 12px;
            margin-bottom: 20px;
        }
        .vessel-card {
            background: var(--card2);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 16px;
            text-align: center;
        }
        .vessel-card .v-name { font-weight: 700; font-size:1.05em; }
        .vessel-card .v-imo { color:var(--muted); font-size:0.85em; }

        /* Error */
        .error-box {
            display: none;
            max-width: 600px;
            margin: 20px auto;
            padding: 20px;
            background: rgba(233,69,96,0.1);
            border: 1px solid var(--accent2);
            border-radius: var(--radius);
            color: var(--accent2);
            text-align: center;
        }
        .error-box.active { display: block; }

        /* Footer */
        .footer {
            text-align: center;
            padding: 30px;
            color: var(--muted);
            font-size: 0.78em;
            border-top: 1px solid var(--border);
        }
        .footer a { color: var(--accent); text-decoration: none; }

        /* Responsive */
        @media (max-width: 600px) {
            .search-box { flex-direction: column; }
            .search-box select, .search-box button { width: 100%; }
            .summary { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>

<div class="header">
    <h1>🚢 <span>SeaRates</span> Tracker</h1>
    <p>تتبع الحاويات البحرية • الشحن الجوي • الطرود البريدية • السكك الحديدية</p>
</div>

<div class="search-section">
    <div class="search-box">
        <input type="text" id="trackingNumber" 
               placeholder="أدخل رقم الحاوية أو التتبع (مثلاً: MEDU3288655)" 
               autocomplete="off" autofocus>
        <select id="trackingType">
            <option value="sea">🚢 بحري</option>
            <option value="air">✈️ جوي</option>
            <option value="parcel">📦 بريدي</option>
            <option value="rail">🚂 سكك</option>
        </select>
        <button id="searchBtn" onclick="doTrack()">🔍 تتبّع</button>
    </div>
    <div class="example-hint">
        مثال: <a onclick="tryExample('TCNU3024167')">TCNU3024167</a> ·
        <a onclick="tryExample('MEDU3288655')">MEDU3288655</a> ·
        <a onclick="tryExample('MAEU9168137')">MAEU9168137</a> ·
        <a onclick="tryExample('1Z9999999999999999','parcel')">UPS بريدي</a>
    </div>
</div>

<div class="loader" id="loader">
    <div class="spinner"></div>
    <p>جاري البحث عن الشحنة...</p>
</div>

<div class="error-box" id="errorBox"></div>

<div class="results" id="results">
    <!-- Summary Cards -->
    <div class="summary" id="summary"></div>

    <!-- Progress -->
    <div class="progress-wrap" id="progressWrap" style="display:none">
        <div class="progress-label">
            <span>تقدم الرحلة</span>
            <span id="progressPercent">0%</span>
        </div>
        <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
    </div>

    <!-- Map -->
    <div id="map"></div>

    <!-- Vessels -->
    <div class="vessels" id="vessels"></div>

    <!-- Events -->
    <div class="events-title">📋 سجل الأحداث</div>
    <div class="timeline" id="events"></div>
</div>

<div class="footer">
    مبني على <a href="https://github.com/mohammedbenchaa/searates-tracker" target="_blank">searates-tracker</a> v1.0.0 ·
    بيانات التتبع من SeaRates API
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    let map = null;
    let mapInitialized = false;

    function initMap() {
        if (mapInitialized) return;
        map = L.map('map').setView([25, 10], 2);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
            attribution: '© CartoDB',
            maxZoom: 10
        }).addTo(map);
        mapInitialized = true;
    }

    function destroyMap() {
        if (map) {
            map.remove();
            map = null;
            mapInitialized = false;
        }
    }

    function tryExample(num, type) {
        document.getElementById('trackingNumber').value = num;
        if (type) document.getElementById('trackingType').value = type;
        doTrack();
    }

    async function doTrack() {
        const number = document.getElementById('trackingNumber').value.trim();
        const type = document.getElementById('trackingType').value;

        if (!number) return;

        // Hide previous results
        document.getElementById('results').classList.remove('active');
        document.getElementById('errorBox').classList.remove('active');
        document.getElementById('loader').classList.add('active');
        document.getElementById('searchBtn').disabled = true;
        destroyMap();

        try {
            const resp = await fetch('/api/track', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({number, type})
            });
            const data = await resp.json();

            document.getElementById('loader').classList.remove('active');
            document.getElementById('searchBtn').disabled = false;

            if (!data.success) {
                showError(data.error || 'فشل التتبع');
                return;
            }

            renderResults(data);
        } catch (err) {
            document.getElementById('loader').classList.remove('active');
            document.getElementById('searchBtn').disabled = false;
            showError('خطأ في الاتصال بالخادم: ' + err.message);
        }
    }

    function showError(msg) {
        const box = document.getElementById('errorBox');
        box.textContent = '❌ ' + msg;
        box.classList.add('active');
    }

    function renderResults(data) {
        const d = data.data;
        document.getElementById('results').classList.add('active');

        // Summary
        const statusMap = {
            'IN_TRANSIT': '🟢 في الطريق',
            'DELIVERED': '✅ تم التسليم',
            'DISCHARGED': '📦 تم التفريغ',
            'BOOKED': '📋 محجوز',
            'RECEIVED': '📥 تم الاستلام',
            'ARRIVED': '⚓ وصل',
            'DEPARTED': '🚢 غادر',
            'UNKNOWN': '❓ غير معروف'
        };
        const status = statusMap[d.status] || d.status || '—';
        const statusClass = d.status === 'IN_TRANSIT' ? 'blue' : 
                           d.status === 'DELIVERED' || d.status === 'DISCHARGED' ? 'green' : 'red';

        document.getElementById('summary').innerHTML = `
            <div class="summary-card">
                <div class="label">الناقل</div>
                <div class="value blue">${d.carrier || '—'}</div>
            </div>
            <div class="summary-card">
                <div class="label">الحالة</div>
                <div class="value ${statusClass}">${status}</div>
            </div>
            <div class="summary-card">
                <div class="label">من</div>
                <div class="value">${d.from || '—'}</div>
            </div>
            <div class="summary-card">
                <div class="label">إلى</div>
                <div class="value">${d.to || '—'}</div>
            </div>
            <div class="summary-card">
                <div class="label">الوصول المتوقع</div>
                <div class="value">${d.eta || '—'}</div>
            </div>
            <div class="summary-card">
                <div class="label">رقم الشحنة</div>
                <div class="value blue">${d.number}</div>
            </div>
        `;

        // Progress
        if (d.progress !== null && d.progress !== undefined) {
            document.getElementById('progressWrap').style.display = 'block';
            document.getElementById('progressPercent').textContent = d.progress + '%';
            document.getElementById('progressFill').style.width = d.progress + '%';
        } else {
            document.getElementById('progressWrap').style.display = 'none';
        }

        // Events timeline
        let eventsHtml = '';
        const events = d.events || [];
        events.forEach((e, i) => {
            const isLatest = i === events.length - 1;
            eventsHtml += `
                <div class="timeline-item ${isLatest ? 'latest' : ''}">
                    <div class="event-date">${e.date || ''}</div>
                    <div class="event-desc">${e.event || ''}</div>
                    <div class="event-loc">📍 ${e.location || ''}</div>
                    ${e.vessel ? `<div class="event-vessel">🚢 ${e.vessel} ${e.voyage ? '('+e.voyage+')' : ''}</div>` : ''}
                </div>
            `;
        });
        document.getElementById('events').innerHTML = eventsHtml || '<p style="color:var(--muted);text-align:center">لا توجد أحداث</p>';

        // Vessels
        const vessels = d.vessels || [];
        if (vessels.length > 0) {
            document.getElementById('vessels').innerHTML = vessels.map(v => `
                <div class="vessel-card">
                    <div class="v-name">🚢 ${v.name}</div>
                    <div class="v-imo">IMO: ${v.imo || '—'}</div>
                </div>
            `).join('');
            document.getElementById('vessels').style.display = '';
        } else {
            document.getElementById('vessels').style.display = 'none';
        }

        // Map
        const routes = d.routes || [];
        if (routes.length > 0) {
            initMap();
            const colors = ['#00d2ff', '#ff6b6b', '#51cf66', '#ffd43b'];
            const bounds = [];

            routes.forEach((route, idx) => {
                if (route.path && route.path.length > 0) {
                    const path = route.path.map(p => [p[0], p[1]]);
                    L.polyline(path, {
                        color: colors[idx % colors.length],
                        weight: 2.5,
                        opacity: 0.8
                    }).addTo(map);
                    bounds.push(...path);
                }
            });

            // Add markers for key points
            if (routes.length > 0) {
                const firstRoute = routes[0];
                const lastRoute = routes[routes.length - 1];

                if (firstRoute.from && firstRoute.from.name) {
                    const fromPath = firstRoute.path;
                    if (fromPath && fromPath.length > 0) {
                        L.marker([fromPath[0][0], fromPath[0][1]], {
                            icon: L.divIcon({
                                className: '',
                                html: '<div style="background:#00d2ff;width:14px;height:14px;border-radius:50%;border:2px solid white;box-shadow:0 0 10px #00d2ff;"></div>',
                                iconSize: [14,14], iconAnchor: [7,7]
                            })
                        }).addTo(map).bindPopup(`<b>🚢 ${firstRoute.from.name}</b><br>${firstRoute.from.country || ''}`);
                    }
                }
                if (lastRoute.to && lastRoute.to.name) {
                    const toPath = lastRoute.path;
                    if (toPath && toPath.length > 0) {
                        const lastPt = toPath[toPath.length - 1];
                        L.marker([lastPt[0], lastPt[1]], {
                            icon: L.divIcon({
                                className: '',
                                html: '<div style="background:#51cf66;width:16px;height:16px;border-radius:50%;border:3px solid white;box-shadow:0 0 15px #51cf66;"></div>',
                                iconSize: [16,16], iconAnchor: [8,8]
                            })
                        }).addTo(map).bindPopup(`<b>📍 ${lastRoute.to.name}</b><br>${lastRoute.to.country || ''}`);
                    }
                }
            }

            if (bounds.length > 0) {
                map.fitBounds(bounds, {padding: [50, 50]});
            }

            // Wait for map tiles to render then invalidate size
            setTimeout(() => {
                if (map) map.invalidateSize();
            }, 200);
        } else {
            document.getElementById('map').style.display = 'none';
        }

        // Scroll to results
        document.getElementById('results').scrollIntoView({behavior: 'smooth'});
    }

    // Enter key to search
    document.getElementById('trackingNumber').addEventListener('keydown', function(e) {
        if (e.key === 'Enter') doTrack();
    });

    // Track on page load if URL has ?q= parameter
    window.addEventListener('DOMContentLoaded', () => {
        const params = new URLSearchParams(window.location.search);
        const q = params.get('q');
        if (q) {
            document.getElementById('trackingNumber').value = q;
            doTrack();
        }
    });
</script>

</body>
</html>
